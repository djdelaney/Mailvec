# Build the two deploy images (app + mbsync sidecar) in CI and push to GHCR,
# so the homelab VM can `docker compose pull` instead of building on-host
# (docs/deploy-docker.md "Prebuilt images"). linux/amd64 only — the deploy VM
# is x86 and the natives (vec0.so, PDFium/SkiaSharp) are fetched by TARGETARCH
# inside the build, so a CI build is equivalent to an on-host one.
#
# Publishing is GATED ON CI SUCCESS: the workflow_run trigger fires only when
# the CI workflow completes, and the job checks its conclusion — otherwise
# :latest would advance on every main push even with a red test suite (the
# two workflows are independent). Tag pushes (v*) publish directly: releases
# are cut from commits that already passed on main.
#
# Deploys must pin sha-<gitsha> or v<version>, never chase :latest — the app
# runs SchemaMigrator against the seeded archive on every start, so image
# updates are manual and backup-first (see the no-auto-update note in
# docs/deploy-docker.md). GHCR version pruning lives in cleanup.yml.

name: Publish images

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  images:
    # For workflow_run events, publish only when CI passed. Tag pushes and
    # manual dispatches have no workflow_run payload and publish directly.
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      matrix:
        include:
          - name: app
            image: ghcr.io/${{ github.repository_owner }}/mailvec
            target: runtime   # explicit: never depend on "last stage wins"
          - name: mbsync
            image: ghcr.io/${{ github.repository_owner }}/mailvec-mbsync
            target: mbsync
    steps:
      - uses: actions/checkout@v7
        with:
          # Under workflow_run, github.sha is the default-branch head at
          # trigger time, which may have advanced past the commit CI actually
          # tested — build exactly what passed.
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.ref }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute tags
        id: tags
        run: |
          set -euo pipefail
          SHORT_SHA="$(git rev-parse --short=7 HEAD)"
          TAGS="${{ matrix.image }}:sha-${SHORT_SHA}"
          if [[ "${{ github.event_name }}" == "workflow_run" || "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            TAGS="$TAGS,${{ matrix.image }}:latest"
          fi
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAGS="$TAGS,${{ matrix.image }}:${GITHUB_REF_NAME}"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "revision=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          echo "Publishing: $TAGS"

      - uses: docker/build-push-action@v6
        with:
          context: .
          target: ${{ matrix.target }}
          platforms: linux/amd64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ steps.tags.outputs.revision }}
          # Scoped per image so app/mbsync don't evict each other. NOTE:
          # cleanup.yml's cache prune is scoped to nuget-* keys precisely so
          # it doesn't thrash these buildx entries; GitHub's own 7-day-unused
          # / 10GB LRU eviction manages them.
          cache-from: type=gha,scope=${{ matrix.name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.name }}
