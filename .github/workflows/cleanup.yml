# Actions housekeeping. Three things accumulate on GitHub: workflow-run
# history (logs), Actions caches, and — since publish-images.yml — GHCR
# container versions (a sha-tagged pair per green main push). Keep the
# newest two of each, delete the rest weekly.
#
# The cache prune is scoped to nuget-* keys ON PURPOSE: publish-images.yml
# stores buildx layer caches as Actions caches too, and an unscoped
# keep-newest-2 would thrash one set or the other every Monday. Buildx
# entries are left to GitHub's own 7-day-unused / 10GB LRU eviction.
#
# Scope guard: this deletes completed workflow runs, nuget caches, and
# sha-tagged/untagged GHCR versions only — it never touches releases, git
# tags, v*-tagged or :latest images, or git history. If a workflow ever
# starts uploading artifacts, prefer `retention-days` on the upload step
# over extending this job.

name: Cleanup

on:
  schedule:
    - cron: "17 5 * * 1" # Mondays 05:17 UTC
  workflow_dispatch:

permissions:
  actions: write
  packages: write

concurrency:
  group: cleanup

jobs:
  prune:
    name: Prune old runs + caches (keep newest 2)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      GH_TOKEN: ${{ github.token }}
      REPO: ${{ github.repository }}
      KEEP: 2
    steps:
      - name: Prune workflow runs
        run: |
          set -euo pipefail
          gh api "repos/$REPO/actions/workflows" --jq '.workflows[].id' |
          while read -r wf; do
            # Runs come back newest-first; status=completed skips anything
            # in flight (including this run).
            gh api --paginate "repos/$REPO/actions/workflows/$wf/runs?status=completed&per_page=100" \
              --jq '.workflow_runs[].id' |
            tail -n +$((KEEP + 1)) |
            while read -r run; do
              echo "Deleting run $run (workflow $wf)"
              gh api -X DELETE "repos/$REPO/actions/runs/$run"
            done
          done

      - name: Prune caches (nuget-* only — buildx caches are GitHub-managed)
        run: |
          set -euo pipefail
          # Sort by last access so the cache CI is actively restoring is
          # always among the survivors. --key scopes to the NuGet caches;
          # see the header for why buildx entries are excluded.
          gh cache list --repo "$REPO" --limit 100 --key nuget- \
            --sort last_accessed_at --order desc \
            --json id --jq '.[].id' |
          tail -n +$((KEEP + 1)) |
          while read -r id; do
            echo "Deleting cache $id"
            gh cache delete "$id" --repo "$REPO"
          done

      - name: Prune GHCR image versions (keep newest sha builds; never v* or latest)
        run: |
          set -euo pipefail
          OWNER="${REPO%%/*}"
          for pkg in mailvec mailvec-mbsync; do
            # 404 = package not published yet — nothing to prune.
            if ! versions=$(gh api --paginate "/users/$OWNER/packages/container/$pkg/versions" 2>/dev/null); then
              echo "$pkg: no package versions found (not published yet?); skipping"
              continue
            fi
            # Protect any version carrying a v* or latest tag (releases and
            # the rolling pointer); of the rest (sha-only or untagged), keep
            # the newest $KEEP and delete the remainder. --paginate emits
            # concatenated arrays, so merge with `jq -s add` first. If the
            # DELETEs start returning 403, GITHUB_TOKEN can't delete this
            # package — fall back to a classic PAT with delete:packages in a
            # secret.
            echo "$versions" |
            jq -s 'add // []' |
            jq -r --argjson keep "$KEEP" '
              [ .[] | select(
                  ((.metadata.container.tags // []) | any(. == "latest" or startswith("v"))) | not
                ) ]
              | sort_by(.created_at) | reverse | .[$keep:] | .[].id' |
            while read -r vid; do
              [ -z "$vid" ] && continue
              echo "Deleting $pkg version $vid"
              gh api -X DELETE "/users/$OWNER/packages/container/$pkg/versions/$vid"
            done
          done
